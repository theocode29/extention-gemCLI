description = "Write a file from JSON payload. Usage: /dp:write <payload_json>"
prompt = """
Write file content.

Input: {{args}}

Requirements:
- Input must be JSON object with keys: path, content.
- If missing input, return exactly: ERROR: missing required argument <payload_json>
- If invalid JSON, return exactly: ERROR: invalid JSON for <payload_json>
- If path/content missing, return exactly: ERROR: payload must include path and content

Execution:
- Parse JSON input object.
- Call MCP tool fs_diff_write with parsed object.

Return write status.
"""
